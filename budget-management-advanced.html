            const [success, setSuccess] = useState(null);

            // 데이터 상태
            const [executions, setExecutions] = useState([]);
            const [stats, setStats] = useState({});

            // 폼 상태
            const [formData, setFormData] = useState({
                subcategory_id: "",
                budget_item_id: "",
                description: "",
                amount: "",
                payment_method: "카드",
                execution_date: new Date().toISOString().split("T")[0],
                recipient: "",
                notes: ""
            });

            // 계산기 상태
            const [calculatorAmount, setCalculatorAmount] = useState("");

            // 차트 레퍼런스
            const chartRef = useRef(null);

            // 데이터 로딩 함수들
            const loadExecutions = useCallback(async () => {
                try {
                    const { data, error } = await supabase
                        .from('budget_executions')
                        .select('*')
                        .order('execution_date', { ascending: false });

                    if (error) throw error;
                    return data || [];
                } catch (err) {
                    console.error('Error loading executions:', err);
                    return [];
                }
            }, []);

            const calculateStats = useCallback((executions) => {
                const totalBudget = BUDGET_DATA.totalBudget;
                const usedBudget = executions.reduce((sum, exec) => sum + (exec.amount || 0), 0);
                const usageRate = (usedBudget / totalBudget) * 100;

                // 카테고리별 집행 현황
                const categoryStats = BUDGET_DATA.categories.map(cat => {
                    const categoryExecutions = executions.filter(exec =>
                        cat.subcategories.some(subcat => subcat.id === exec.subcategory_id)
                    );
                    const used = categoryExecutions.reduce((sum, exec) => sum + exec.amount, 0);
                    return {
                        ...cat,
                        used,
                        remaining: cat.budget - used,
                        usageRate: (used / cat.budget) * 100
                    };
                });

                // 월별 집행 현황
                const monthlyStats = executions.reduce((acc, exec) => {
                    const month = new Date(exec.execution_date).toISOString().substr(0, 7);
                    acc[month] = (acc[month] || 0) + exec.amount;
                    return acc;
                }, {});

                // 유형별 집행 현황
                const typeStats = executions.reduce((acc, exec) => {
                    acc[exec.type] = (acc[exec.type] || 0) + exec.amount;
                    return acc;
                }, {});

                return {
                    totalBudget,
                    usedBudget,
                    remainingBudget: totalBudget - usedBudget,
                    usageRate,
                    categoryStats,
                    monthlyStats,
                    typeStats,
                    executionCount: executions.length
                };
            }, []);

            // 초기 데이터 로딩
            useEffect(() => {
                const loadData = async () => {
                    try {
                        setLoading(true);
                        setError(null);

                        const executions = await loadExecutions();
                        const stats = calculateStats(executions);

                        setExecutions(executions);
                        setStats(stats);

                    } catch (err) {
                        setError('데이터를 불러오는 중 오류가 발생했습니다: ' + err.message);
                    } finally {
                        setLoading(false);
                    }
                };

                loadData();
            }, [loadExecutions, calculateStats]);

            // 차트 그리기
            useEffect(() => {
                if (currentTab === "dashboard" && stats.categoryStats && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');

                    // 기존 차트 파괴
                    if (window.budgetChart) {
                        window.budgetChart.destroy();
                    }

                    window.budgetChart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: stats.categoryStats.map(cat => cat.name),
                            datasets: [{
                                data: stats.categoryStats.map(cat => cat.used),
                                backgroundColor: [
                                    '#134E42',
                                    '#1B6B5A',
                                    '#2F7D6B'
                                ],
                                borderWidth: 2,
                                borderColor: '#fff'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        padding: 20,
                                        usePointStyle: true
                                    }
                                }
                            }
                        }
                    });
                }
            }, [currentTab, stats.categoryStats]);

            // 예산 집행 등록
            const handleSubmitExecution = async (e) => {
                e.preventDefault();

                try {
                    setError(null);
                    setSuccess(null);

                    // 유효성 검사
                    if (!formData.subcategory_id || !formData.description || !formData.amount) {
                        throw new Error('필수 항목을 모두 입력해주세요.');
                    }

                    const amount = parseInt(formData.amount);
                    if (isNaN(amount) || amount <= 0) {
                        throw new Error('올바른 금액을 입력해주세요.');
                    }

                    // 예산 항목 정보 찾기
                    const subcategory = BUDGET_DATA.categories
                        .flatMap(cat => cat.subcategories)
                        .find(subcat => subcat.id === formData.subcategory_id);

                    if (!subcategory) {
                        throw new Error('유효하지 않은 예산 항목입니다.');
                    }

                    const budgetItem = subcategory.items.find(item => item.id === formData.budget_item_id);

                    const executionData = {
                        subcategory_id: formData.subcategory_id,
                        subcategory_name: subcategory.name,
                        category_name: BUDGET_DATA.categories.find(cat =>
                            cat.subcategories.some(sub => sub.id === formData.subcategory_id)
                        ).name,
                        budget_item_id: formData.budget_item_id || "",
                        budget_item_name: budgetItem ? budgetItem.name : formData.description,
                        type: budgetItem ? budgetItem.type : "일반지출",
                        description: formData.description,
                        amount: amount,
                        payment_method: formData.payment_method,
                        execution_date: formData.execution_date,
                        recipient: formData.recipient || null,
                        notes: formData.notes || null,
                        status: 'pending'
                    };

                    const { error } = await supabase
                        .from('budget_executions')
                        .insert([executionData]);

                    if (error) throw error;

                    setSuccess('예산 집행이 등록되었습니다.');

                    // 폼 초기화
                    setFormData({
                        subcategory_id: "",
                        budget_item_id: "",
                        description: "",
                        amount: "",
                        payment_method: "카드",
                        execution_date: new Date().toISOString().split("T")[0],
                        recipient: "",
                        notes: ""
                    });

                    // 데이터 새로고침
                    const newExecutions = await loadExecutions();
                    const newStats = calculateStats(newExecutions);
                    setExecutions(newExecutions);
                    setStats(newStats);

                } catch (err) {
                    setError(err.message);
                }
            };

            // 현재 선택된 서브카테고리의 예산 항목들 가져오기
            const getAvailableItems = () => {
                if (!formData.subcategory_id) return [];

                const subcategory = BUDGET_DATA.categories
                    .flatMap(cat => cat.subcategories)
                    .find(subcat => subcat.id === formData.subcategory_id);

                return subcategory ? subcategory.items : [];
            };

            // 선택된 예산 항목의 타입 가져오기
            const getSelectedItemType = () => {
                const items = getAvailableItems();
                const item = items.find(item => item.id === formData.budget_item_id);
                return item ? item.type : "일반지출";
            };

            // 미리보기용 증빙서류 계산
            const getPreviewDocuments = () => {
                if (!formData.amount) return null;

                const amount = parseInt(formData.amount);
                if (isNaN(amount)) return null;

                const type = getSelectedItemType();
                return getRequiredDocuments(type, formData.payment_method, amount);

                    <p className="section-subtitle">
                        총 7천만원 예산의 실시간 집행 현황과 통계를 확인할 수 있습니다.

                    {/* 주요 통계 */}

                        <div className="stat-card">

                        <div className="stat-card">

                                        <span style={{ fontWeight: '600', color: '#2D3748' }}>{cat.name}</span>
                                        <span style={{ fontSize: '14px', color: '#718096' }}>
                                            {formatPercent(cat.usageRate)}%

                                    <div className="progress-bar">

                                    <div style={{
                                        display: 'flex',
                                        justifyContent: 'space-between',
                                        fontSize: '12px',
                                        color: '#718096',
                                        marginTop: '4px'
                                    }}>
                                        <span>집행: {formatCurrency(cat.used)}원</span>
                                        <span>예산: {formatCurrency(cat.budget)}원</span>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* 집행 분포 차트 */}
                        <div className="card">
                            <div className="card-header">
                                <h2 className="card-title">🥧 집행 분포</h2>
                            </div>
                            <div className="chart-container">
                                <canvas ref={chartRef}></canvas>
                            </div>
                        </div>
                    </div>

                    {/* 최근 집행 내역 */}
                    <div className="card">
                        <div className="card-header">
                            <h2 className="card-title">📋 최근 집행 내역</h2>
                            <button
                                className="btn btn-primary"
                                onClick={() => setCurrentTab("register")}
                            >
                                ➕ 집행 등록
                            </button>
                        </div>
                        {executions.slice(0, 5).map(execution => (

                                <div className="execution-header">
                                    <div>
                                        <div className="execution-title">{execution.budget_item_name}</div>
                                        <div style={{ color: '#718096', fontSize: '14px' }}>
                                            {execution.description}
                                        </div>
                                    </div>
                                    <div style={{ textAlign: 'right' }}>
                                        <div className="execution-amount">
                                            {formatCurrency(execution.amount)}원
                                        </div>
                                        <span className={`badge ${
                                            execution.status === 'completed' ? 'badge-success' :
                                            execution.status === 'approved' ? 'badge-info' :
                                            execution.status === 'executed' ? 'badge-warning' :
                                            'badge-info'
                                        }`}>
                                            {execution.status === 'completed' ? '완료' :
                                             execution.status === 'approved' ? '승인' :
                                             execution.status === 'executed' ? '집행' : '대기'}
                                        </span>
                                    </div>
                                </div>
                                <div className="execution-meta">
                                    <div className="meta-item">
                                        🏷️ {execution.category_name} > {execution.subcategory_name}
                                    </div>
                                    <div className="meta-item">
                                        💳 {execution.payment_method}
                                    </div>
                                    <div className="meta-item">
                                        📅 {execution.execution_date}
                                    </div>
                                    {execution.recipient && (
                                        <div className="meta-item">
                                            👤 {execution.recipient}
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}

                        {executions.length === 0 && (
                            <div style={{ textAlign: 'center', color: '#718096', padding: '40px' }}>
                                아직 등록된 예산 집행 내역이 없습니다.
                            </div>
                        )}
                    </div>
                </div>
            );

            const renderRegister = () => {
                const previewDocs = getPreviewDocuments();
                const selectedItemType = getSelectedItemType();
                const withholdingCalc = formData.amount ?
                    calculateWithholdingTax(parseInt(formData.amount) || 0) : null;

                return (
                    <div>
                        <h1 className="section-title">
                            ➕ 예산집행 등록
                        </h1>
                        <p className="section-subtitle">
                            새로운 예산 집행을 등록하고 증빙서류를 관리합니다.
                        </p>

                        {error && (
                            <div className="alert alert-danger">
                                ⚠️ {error}
                            </div>
                        )}

                        {success && (
                            <div className="alert alert-success">
                                ✅ {success}
                            </div>
                        )}

                        <form onSubmit={handleSubmitExecution}>
                            <div className="grid-2">
                                {/* 기본 정보 입력 */}
                                <div className="card">
                                    <div className="card-header">
                                        <h2 className="card-title">📝 기본 정보</h2>
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">예산 카테고리 *</label>
                                        <select
                                            className="form-select"
                                            value={formData.subcategory_id}
                                            onChange={(e) => {
                                                setFormData({
                                                    ...formData,
                                                    subcategory_id: e.target.value,
                                                    budget_item_id: ""
                                                });
                                            }}
                                            required
                                        >
                                            <option value="">선택해주세요</option>
                                            {BUDGET_DATA.categories.map(cat =>
                                                cat.subcategories.map(subcat => (
                                                    <option key={subcat.id} value={subcat.id}>
                                                        {cat.name} > {subcat.name}
                                                    </option>
                                                ))
                                            )}
                                        </select>
                                    </div>

                                    {getAvailableItems().length > 0 && (
                                        <div className="form-group">
                                            <label className="form-label">예산 항목</label>
                                            <select
                                                className="form-select"
                                                value={formData.budget_item_id}
                                                onChange={(e) => setFormData({
                                                    ...formData,
                                                    budget_item_id: e.target.value
                                                })}
                                            >
                                                <option value="">직접 입력</option>
                                                {getAvailableItems().map(item => (
                                                    <option key={item.id} value={item.id}>
                                                        {item.name} ({item.type})
                                                    </option>
                                                ))}
                                            </select>
                                        </div>
                                    )}

                                    <div className="form-group">
                                        <label className="form-label">집행 내역 *</label>
                                        <textarea
                                            className="form-textarea"
                                            value={formData.description}
                                            onChange={(e) => setFormData({
                                                ...formData,
                                                description: e.target.value
                                            })}
                                            placeholder="집행 내역을 상세히 입력해주세요"
                                            required
                                        />
                                    </div>

                                    <div className="form-grid">
                                        <div className="form-group">
                                            <label className="form-label">집행 금액 *</label>
                                            <input
                                                type="number"
                                                className="form-input"
                                                value={formData.amount}
                                                onChange={(e) => setFormData({
                                                    ...formData,
                                                    amount: e.target.value
                                                })}
                                                placeholder="금액 (원)"
                                                required
                                            />
                                        </div>

                                        <div className="form-group">
                                            <label className="form-label">결제 방법 *</label>
                                            <select
                                                className="form-select"
                                                value={formData.payment_method}
                                                onChange={(e) => setFormData({
                                                    ...formData,
                                                    payment_method: e.target.value
                                                })}
                                                required
                                            >
                                                <option value="카드">카드</option>
                                                <option value="계좌이체">계좌이체</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="form-grid">
                                        <div className="form-group">
                                            <label className="form-label">집행일 *</label>
                                            <input
                                                type="date"
                                                className="form-input"
                                                value={formData.execution_date}
                                                onChange={(e) => setFormData({
                                                    ...formData,
                                                    execution_date: e.target.value
                                                })}
                                                required
                                            />
                                        </div>

                                        <div className="form-group">
                                            <label className="form-label">수령인</label>
                                            <input
                                                type="text"
                                                className="form-input"
                                                value={formData.recipient}
                                                onChange={(e) => setFormData({
                                                    ...formData,
                                                    recipient: e.target.value
                                                })}
                                                placeholder="수령인 이름"
                                            />
                                        </div>
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">비고</label>
                                        <textarea
                                            className="form-textarea"
                                            value={formData.notes}
                                            onChange={(e) => setFormData({
                                                ...formData,
                                                notes: e.target.value
                                            })}
                                            placeholder="추가 메모사항"
                                        />
                                    </div>
                                </div>

                                {/* 미리보기 및 계산 */}
                                <div>
                                    {/* 원천징수 계산기 */}

                                      selectedItemType === "사업인건비" ||
                                      selectedItemType === "단순인건비") && formData.amount && (
                                        <div className="calculator-section">

                                            {withholdingCalc && (

                                    </div>
                                    <span className={`badge ${
                                        execution.status === 'completed' ? 'badge-success' :
                                        execution.status === 'approved' ? 'badge-info' :
                                        execution.status === 'executed' ? 'badge-warning' :
                                        'badge-info'
                                    }`}>
                                        {execution.status === 'completed' ? '완료' :
                                         execution.status === 'approved' ? '승인' :
                                         execution.status === 'executed' ? '집행' : '대기'}
                                    </span>
                                </div>
                            </div>

                            <div className="execution-meta">
                                <div className="meta-item">
                                    🏷️ {execution.category_name} > {execution.subcategory_name}
                                </div>
                                <div className="meta-item">
                                    💳 {execution.payment_method}
                                </div>
                                <div className="meta-item">
                                    📅 {execution.execution_date}
                                </div>
                                {execution.recipient && (
                                    <div className="meta-item">
                                        👤 {execution.recipient}
                                    </div>
                                )}
                            </div>

                            {execution.notes && (
                                <div style={{
                                    marginTop: '16px',
                                    padding: '12px',
                                    background: '#F7FAFC',
                                    borderRadius: '8px',
                                    fontSize: '14px',
                                    color: '#4A5568'
                                }}>
                                    <strong>메모:</strong> {execution.notes}
                                </div>
                            )}
                        </div>
                    ))}

                    {executions.length === 0 && (
                        <div style={{ textAlign: 'center', color: '#718096', padding: '60px' }}>
                            <div style={{ fontSize: '48px', marginBottom: '16px' }}>💼</div>
                            <div style={{ fontSize: '18px', marginBottom: '8px' }}>등록된 집행 내역이 없습니다</div>
                            <div style={{ fontSize: '14px' }}>새로운 예산 집행을 등록해보세요!</div>
                            <button
                                className="btn btn-primary"
                                style={{ marginTop: '20px' }}
                                onClick={() => setCurrentTab("register")}
                            >
                                ➕ 집행 등록하기
                            </button>
                        </div>
                    )}
                </div>
            );

            const renderCalculator = () => (
                <div>
                    <h1 className="section-title">
                        🧮 원천징수 계산기
                    </h1>
                    <p className="section-subtitle">
                        자문비, 인건비 등의 원천징수세를 자동으로 계산합니다.
                    </p>

                    <div className="grid-2">
                        <div className="card">
                            <div className="card-header">
                                <h2 className="card-title">💰 금액 입력</h2>
                            </div>

                            <div className="form-group">
                                <label className="form-label">지급 금액</label>
                                <input
                                    type="number"
                                    className="form-input"
                                    value={calculatorAmount}
                                    onChange={(e) => setCalculatorAmount(e.target.value)}
                                    placeholder="계산할 금액을 입력하세요 (원)"
                                    style={{ fontSize: '18px', padding: '16px' }}
                                />
                            </div>

                            <div className="alert alert-info">
                                <strong>💡 원천징수 기준</strong><br/>
                                • 125,000원 이하: 원천징수 없음<br/>
                                • 125,000원 초과: 소득세 8% + 지방소득세 10% (소득세의 10%)
                            </div>
                        </div>

                        <div className="card">
                            <div className="card-header">
                                <h2 className="card-title">📊 계산 결과</h2>
                            </div>

                            {calculatorAmount && !isNaN(parseInt(calculatorAmount)) && (
                                (() => {
                                    const calc = calculateWithholdingTax(parseInt(calculatorAmount));
                                    return (
                                        <div className="calculation-result">
                                            <div className="result-item">
                                                <span>총 지급액</span>
                                                <span>{formatCurrency(parseInt(calculatorAmount))}원</span>
                                            </div>
                                            <div className="result-item">
                                                <span>소득세 (8%)</span>
                                                <span>{formatCurrency(calc.income)}원</span>
                                            </div>
                                            <div className="result-item">
                                                <span>지방소득세 (소득세의 10%)</span>
                                                <span>{formatCurrency(calc.local)}원</span>
                                            </div>
                                            <div className="result-item">
                                                <span>총 징수세액</span>
                                                <span>{formatCurrency(calc.total)}원</span>
                                            </div>
                                            <div className="result-item">
                                                <span>실수령액</span>
                                                <span>{formatCurrency(calc.net)}원</span>
                                            </div>
                                        </div>
                                    );
                                })()
                            )}

                            {(!calculatorAmount || isNaN(parseInt(calculatorAmount))) && (
                                <div style={{
                                    textAlign: 'center',
                                    color: '#718096',
                                    padding: '40px',
                                    fontSize: '16px'
                                }}>
                                    금액을 입력하면 자동으로 계산됩니다
                                </div>
                            )}
                        </div>
                    </div>

                    {/* 예시 테이블 */}
                    <div className="card">
                        <div className="card-header">
                            <h2 className="card-title">📋 계산 예시표</h2>
                        </div>

                        <div style={{ overflowX: 'auto' }}>
                            <table style={{
                                width: '100%',
                                borderCollapse: 'collapse',
                                fontSize: '14px'
                            }}>
                                <thead>
                                    <tr style={{ background: '#F7FAFC' }}>
                                        <th style={{ padding: '12px', border: '1px solid #E2E8F0', textAlign: 'center' }}>지급액</th>
                                        <th style={{ padding: '12px', border: '1px solid #E2E8F0', textAlign: 'center' }}>소득세 (8%)</th>
                                        <th style={{ padding: '12px', border: '1px solid #E2E8F0', textAlign: 'center' }}>지방소득세 (10%)</th>
                                        <th style={{ padding: '12px', border: '1px solid #E2E8F0', textAlign: 'center' }}>실수령액</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {[100000, 125000, 200000, 500000, 1000000].map(amount => {
                                        const calc = calculateWithholdingTax(amount);
                                        return (
                                            <tr key={amount}>
                                                <td style={{ padding: '12px', border: '1px solid #E2E8F0', textAlign: 'right' }}>
                                                    {formatCurrency(amount)}원
                                                </td>
                                                <td style={{ padding: '12px', border: '1px solid #E2E8F0', textAlign: 'right' }}>
                                                    {formatCurrency(calc.income)}원
                                                </td>
                                                <td style={{ padding: '12px', border: '1px solid #E2E8F0', textAlign: 'right' }}>
                                                    {formatCurrency(calc.local)}원
                                                </td>
                                                <td style={{ padding: '12px', border: '1px solid #E2E8F0', textAlign: 'right', fontWeight: '600' }}>
                                                    {formatCurrency(calc.net)}원
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            const renderContent = () => {
                if (loading) {
                    return (
                        <div className="loading">
                            <div className="loading-spinner"></div>
                            <div>예산 데이터를 불러오고 있습니다...</div>
                        </div>
                    );
                }

                if (error && !stats.totalBudget) {
                    return (
                        <div>
                            <div className="alert alert-danger">
                                {error}
                            </div>
                            <button
                                className="btn btn-primary"
                                onClick={() => window.location.reload()}
                            >
                                다시 시도
                            </button>
                        </div>
                    );
                }

                switch(currentTab) {
                    case "dashboard": return renderDashboard();
                    case "register": return renderRegister();
                    case "list": return renderList();
                    case "calculator": return renderCalculator();
                    default: return renderDashboard();
                }
            };

            return (
                <div>
                    {/* Header */}
                    <div className="header">
                        <div className="container" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <div>
                                <h1>💰 예산관리 시스템</h1>
                                <p>아름다운재단 2026 공익단체 인큐베이팅 지원사업 • 청년노동자인권센터</p>
                            </div>
                            <button
                                style={{
                                    padding: '12px 20px',
                                    background: 'rgba(255, 255, 255, 0.2)',
                                    color: 'white',
                                    border: '2px solid rgba(255, 255, 255, 0.3)',
                                    borderRadius: '8px',
                                    cursor: 'pointer',
                                    fontSize: '14px',
                                    fontWeight: '500',
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '8px',
                                    transition: 'all 0.3s',
                                    backdropFilter: 'blur(10px)'
                                }}
                                onClick={() => window.open('index-supabase.html', '_blank')}
                                onMouseOver={(e) => {
                                    e.target.style.background = 'rgba(255, 255, 255, 0.3)';
                                    e.target.style.transform = 'translateY(-1px)';
                                }}
                                onMouseOut={(e) => {
                                    e.target.style.background = 'rgba(255, 255, 255, 0.2)';
                                    e.target.style.transform = 'translateY(0)';
                                }}
                            >
                                🏠 메인 시스템
                            </button>
                        </div>
                    </div>

                    <div className="container">
                        {/* Navigation */}
                        <div className="tab-navigation">
                            {[
                                { id: 'dashboard', label: '📊 대시보드', desc: '전체 현황' },
                                { id: 'register', label: '➕ 집행등록', desc: '새 집행' },
                                { id: 'list', label: '📋 집행내역', desc: '전체 목록' },
                                { id: 'calculator', label: '🧮 계산기', desc: '원천징수' }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    className={`tab-btn ${currentTab === tab.id ? 'active' : ''}`}
                                    onClick={() => setCurrentTab(tab.id)}
                                >
                                    <span>{tab.label}</span>
                                </button>
                            ))}
                        </div>

                        {/* Content */}
                        <div className="content-area">
                            {renderContent()}
                        </div>
                    </div>
                </div>
            );
        }

        // 앱 렌더링
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BudgetManagementSystem />);
    </script>
</body>
</html>
