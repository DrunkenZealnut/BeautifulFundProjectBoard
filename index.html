                                        </div>

                                        {/* 내부 탭: 사업비 / 운영비 */}
                                        <div className="tab-navigation" style={{ marginBottom: '20px' }}>
                                            <button
                                                className={`tab-btn ${ratioTab === 'project' ? 'active' : ''}`}
                                                onClick={() => setRatioTab('project')}
                                            >💼 사업비</button>
                                            <button
                                                className={`tab-btn ${ratioTab === 'operating' ? 'active' : ''}`}
                                                onClick={() => setRatioTab('operating')}
                                            >🏢 운영비</button>
                                        </div>

                                        {/* 카테고리 전체 요약 */}
                                        <div className="card" style={{ marginBottom: '16px' }}>
                                            <div className="card-header">
                                                <h2 className="card-title">{categoryName} 전체 집행현황</h2>
                                                <span style={{
                                                    fontSize: '13px', fontWeight: '600', padding: '3px 10px',
                                                    borderRadius: '10px',
                                                    background: catRate >= 90 ? '#FEE2E2' : catRate >= 70 ? '#FEF3C7' : '#DCFCE7',
                                                    color: catRate >= 90 ? '#DC2626' : catRate >= 70 ? '#D97706' : '#15803D'
                                                }}>{catRate}%</span>
                                            </div>
                                            <div style={{ padding: '6px 0 2px' }}>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px', color: '#6B6560', marginBottom: '10px' }}>
                                                    <span>집행: <strong style={{ color: '#1A1814' }}>{fmt(catExecuted)}원</strong></span>
                                                    <span>예산: <strong style={{ color: '#1A1814' }}>{fmt(catBudget)}원</strong></span>
                                                </div>
                                                <div style={{ background: '#F0EFED', borderRadius: '8px', height: '14px', overflow: 'hidden' }}>
                                                    <div style={{
                                                        background: catRate >= 90 ? '#DC2626' : catRate >= 70 ? '#D97706' : '#134E42',
                                                        width: `${Math.min(100, catRate)}%`,
                                                        height: '100%', borderRadius: '8px', transition: 'width 0.4s ease'
                                                    }} />
                                                </div>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '8px', fontSize: '12px', color: '#6B6560' }}>
                                                    <span>잔액: {fmt(Math.max(0, catBudget - catExecuted))}원</span>
                                                    <span>{catExecuted > catBudget ? <span style={{ color: '#DC2626' }}>초과: {fmt(catExecuted - catBudget)}원</span> : '—'}</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* 소분류별 + 세부항목 집행률 */}
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                            {(category?.subcategories || []).map(sub => {
                                                const subBudget = getBudgetByPeriod(sub, budgetPeriod);
                                                if (subBudget === 0) return null;
                                                const subExecuted = execBySubcat[sub.id] || 0;
                                                const subRate = pct(subExecuted, subBudget);
                                                const remaining = Math.max(0, subBudget - subExecuted);
                                                const barColor = subRate >= 90 ? '#DC2626' : subRate >= 70 ? '#D97706' : '#3B82F6';
                                                const itemsWithBudget = (sub.items || []).filter(item => getBudgetByPeriod(item, budgetPeriod) > 0);
                                                return (
                                                    <div key={sub.id} className="card">
                                                        {/* 소분류 헤더 */}
                                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '10px' }}>
                                                            <div style={{ flex: 1, minWidth: 0 }}>
                                                                <div style={{ fontWeight: '600', marginBottom: '3px', color: '#1A1814', fontSize: '14px' }}>{sub.name}</div>
                                                                <div style={{ fontSize: '12px', color: '#6B6560' }}>예산 {fmt(subBudget)}원</div>
                                                            </div>
                                                            <div style={{ textAlign: 'right', flexShrink: 0, marginLeft: '12px' }}>
                                                                <div style={{ fontSize: '22px', fontWeight: '700', color: barColor, lineHeight: 1.1 }}>{subRate}%</div>
                                                                <div style={{ fontSize: '10px', color: '#9C9690', marginTop: '2px' }}>집행률</div>
                                                            </div>
                                                        </div>
                                                        <div style={{ background: '#F0EFED', borderRadius: '6px', height: '8px', overflow: 'hidden', marginBottom: '10px' }}>
                                                            <div style={{
                                                                background: barColor,
                                                                width: `${Math.min(100, subRate)}%`,
                                                                height: '100%', borderRadius: '6px', transition: 'width 0.3s ease'
                                                            }} />
                                                        </div>
                                                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', color: '#6B6560', marginBottom: itemsWithBudget.length > 0 ? '14px' : '0' }}>
                                                            <span>집행 <strong style={{ color: '#1A1814' }}>{fmt(subExecuted)}원</strong></span>
                                                            <span>잔액 <strong style={{ color: remaining === 0 && subExecuted > 0 ? '#DC2626' : '#1A1814' }}>{fmt(remaining)}원</strong></span>
                                                        </div>

                                                        {/* 세부항목 테이블 */}
                                                        {itemsWithBudget.length > 0 && (
                                                            <div style={{ borderTop: '1px solid #EBE8E1', paddingTop: '12px' }}>
                                                                <div style={{ fontSize: '11px', color: '#9C9690', fontWeight: '600', marginBottom: '8px', textTransform: 'uppercase', letterSpacing: '0.05em' }}>세부 항목</div>
                                                                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                                                    {itemsWithBudget.map(item => {
                                                                        const itemBudget = getBudgetByPeriod(item, budgetPeriod);
                                                                        const itemExecuted = execByItem[item.id] || 0;
                                                                        const itemRate = pct(itemExecuted, itemBudget);
                                                                        const itemColor = itemRate >= 90 ? '#DC2626' : itemRate >= 70 ? '#D97706' : '#134E42';
                                                                        return (
                                                                            <div key={item.id} style={{ background: '#F9F8F6', borderRadius: '8px', padding: '10px 12px' }}>
                                                                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' }}>
                                                                                    <div style={{ flex: 1, minWidth: 0 }}>
                                                                                        <div style={{ fontSize: '13px', fontWeight: '500', color: '#1A1814', marginBottom: '1px' }}>{item.name}</div>
                                                                                        <div style={{ fontSize: '11px', color: '#9C9690' }}>{item.type} · 예산 {fmt(itemBudget)}원</div>
                                                                                    </div>
                                                                                    <div style={{ textAlign: 'right', flexShrink: 0, marginLeft: '10px' }}>
                                                                                        <div style={{ fontSize: '15px', fontWeight: '700', color: itemColor }}>{itemRate}%</div>
                                                                                        <div style={{ fontSize: '10px', color: '#9C9690' }}>{fmt(itemExecuted)}원</div>
                                                                                    </div>
                                                                                </div>
                                                                                <div style={{ background: '#E5E3DF', borderRadius: '4px', height: '5px', overflow: 'hidden' }}>
                                                                                    <div style={{
                                                                                        background: itemColor,
                                                                                        width: `${Math.min(100, itemRate)}%`,
                                                                                        height: '100%', borderRadius: '4px', transition: 'width 0.3s ease'
                                                                                    }} />
                                                                                </div>
                                                                            </div>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })()}
                        </div>
                    </div>
                );
            };

            // 로그아웃
            const handleLogout = () => {
                localStorage.removeItem('bf_user_session');
                setCurrentUser(null);
                setCurrentPage('dashboard');
            };

            // 관리자 페이지 상태
            const [adminUsers, setAdminUsers] = useState([]);
            const [adminLoading, setAdminLoading] = useState(false);
            const [adminError, setAdminError] = useState('');
            const [adminSuccess, setAdminSuccess] = useState('');
            const [showUserForm, setShowUserForm] = useState(false);
            const [editingUser, setEditingUser] = useState(null);
            const [userForm, setUserForm] = useState({
                username: '', name: '', email: '', password: '',
                role: 'staff', phone: '', organization: '청년노동자인권센터', position: ''
            });

            const resetUserForm = () => {
                setUserForm({
                    username: '', name: '', email: '', password: '',
                    role: 'staff', phone: '', organization: '청년노동자인권센터', position: ''
                });
                setEditingUser(null);
                setShowUserForm(false);
            };

            // ── 집행내역 수정/삭제/승인 ────────────────────────────────────
            const [editingExecution, setEditingExecution] = useState(null);
            const [executionEditForm, setExecutionEditForm] = useState({});
            const [executionDeleteId, setExecutionDeleteId] = useState(null);
            const [executionSaving, setExecutionSaving] = useState(false);
            const [executionMsg, setExecutionMsg] = useState('');
            // ── 갤러리 ZIP 다운로드 ───────────────────────────────────────
            const [galleryZipping, setGalleryZipping] = useState(false);

            // ── 성과지표 (system_settings) ────────────────────────────────
            const [perfIndicators, setPerfIndicators] = useState({
                perf_textbook_team: '0', perf_textbook_report: '0',
                perf_campaign_count: '0', perf_app_released: '0', perf_committee_count: '0'
            });
            const [perfEditing, setPerfEditing] = useState(false);
            const [perfDraft, setPerfDraft] = useState(null);
            const [perfSaving, setPerfSaving] = useState(false);
            const [perfMsg, setPerfMsg] = useState('');

            // ── 기관 정보 (system_settings) ──────────────────────────────
            const [orgSettings, setOrgSettings] = useState({
                org_name: '', org_phone: '',
                org_representative: '', org_address: '', org_registration_number: '', org_seal: ''
            });
            const [orgSettingsSaving, setOrgSettingsSaving] = useState(false);
            const [orgSettingsMsg, setOrgSettingsMsg] = useState({ type: '', text: '' });

            // ── 수급자 목록 ───────────────────────────────────────────────
            const [recipients, setRecipients] = useState([]);
            const [recipientsLoading, setRecipientsLoading] = useState(false);
            const [showRecipientForm, setShowRecipientForm] = useState(false);
            const [editingRecipient, setEditingRecipient] = useState(null);
            const [recipientForm, setRecipientForm] = useState({
                name: '', birth_date: '', address: '', phone: '', notes: ''
            });
            const [recipientMsg, setRecipientMsg] = useState({ type: '', text: '' });

            // ── 관리자 탭 ─────────────────────────────────────────────────
            const [adminTab, setAdminTab] = useState('users'); // 'users'|'recipients'|'orgSettings'|'logs'

            // ── 회의진행일지 입력 모달 ─────────────────────────────────────
            const [meetingMinutesModal, setMeetingMinutesModal] = useState(null); // null | { execution }
            const [meetingMinutesForm, setMeetingMinutesForm] = useState({
                title: '', date: '', location: '', content: '', participants: ''
            });

            // ── 사업변경신청서 입력 모달 ─────────────────────────────────────
            const [changeApplicationModal, setChangeApplicationModal] = useState(false);
            const [changeApplicationForm, setChangeApplicationForm] = useState({
                reason: '',
                changeDetails: [{ beforeUnit: '', beforeSchedule: '', beforeContent: '',
                                  afterUnit: '', afterSchedule: '', afterContent: '' }],
                budgetChanges: {},
                specificDetails: [{ unitName: '', beforeAmount: 0, afterAmount: 0, basis: '', reason: '' }],
                applicationDate: new Date().toISOString().slice(0, 10)
            });

            // ── 기관 정보 저장 ────────────────────────────────────────────
            const saveOrgSettings = async () => {
                setOrgSettingsSaving(true);
                setOrgSettingsMsg({ type: '', text: '' });
                try {
                    const rows = [
                        { setting_key: 'org_name',                setting_value: orgSettings.org_name },
                        { setting_key: 'org_phone',               setting_value: orgSettings.org_phone },
                        { setting_key: 'org_representative',      setting_value: orgSettings.org_representative },
                        { setting_key: 'org_address',             setting_value: orgSettings.org_address },
                        { setting_key: 'org_registration_number', setting_value: orgSettings.org_registration_number },
                        { setting_key: 'org_seal',                setting_value: orgSettings.org_seal }
                    ];
                    const { error } = await supabase
                        .from('system_settings')
                        .upsert(rows, { onConflict: 'setting_key' });
                    if (error) throw error;
                    setOrgSettingsMsg({ type: 'success', text: '기관 정보가 저장되었습니다.' });
                } catch (err) {
                    console.error('Error saving org settings:', err);
                    setOrgSettingsMsg({ type: 'error', text: '저장 중 오류가 발생했습니다.' });
                } finally {
                    setOrgSettingsSaving(false);
                }
            };

            // ── 성과지표 저장 ─────────────────────────────────────────────
            const handleSavePerfIndicators = async () => {
                setPerfSaving(true);
                setPerfMsg('');
                try {
                    const rows = Object.entries(perfDraft).map(([k, v]) => ({ setting_key: k, setting_value: String(v) }));
                    const { error } = await supabase
                        .from('system_settings')
                        .upsert(rows, { onConflict: 'setting_key' });
                    if (error) throw error;
                    setPerfIndicators({ ...perfDraft });
                    setPerfEditing(false);
                    setPerfDraft(null);
                    setPerfMsg('저장되었습니다.');
                    setTimeout(() => setPerfMsg(''), 3000);
                } catch (err) {
                    console.error('성과지표 저장 오류:', err);
                    setPerfMsg('저장 중 오류가 발생했습니다.');
                } finally {
                    setPerfSaving(false);
                }
            };

            // ── 집행내역 수정/삭제/승인 핸들러 ───────────────────────────────
            const refreshExecutions = async () => {
                const fresh = await loadBudgetExecutions();
                setData(prev => ({ ...prev, budgetExecutions: fresh }));
            };

            const handleUpdateExecution = async () => {
                if (!editingExecution) return;
                setExecutionSaving(true);
                setExecutionMsg('');
                try {
                    const { error } = await supabase.from('budget_executions').update({
                        subcategory_id: executionEditForm.subcategory_id,
                        subcategory_name: executionEditForm.subcategory_name,
                        category_name: executionEditForm.category_name,
                        budget_item_id: executionEditForm.budget_item_id,
                        budget_item_name: executionEditForm.budget_item_name,
                        type: executionEditForm.type,
                        amount: parseInt(executionEditForm.amount) || 0,
                        payment_method: executionEditForm.payment_method,
                        execution_date: executionEditForm.execution_date,
                        recipient: executionEditForm.recipient || '',
                        description: executionEditForm.description || '',
                        notes: executionEditForm.notes || null
                    }).eq('id', editingExecution.id);
                    if (error) throw error;
                    setEditingExecution(null);
                    await refreshExecutions();
                    setExecutionMsg('수정되었습니다.');
                    setTimeout(() => setExecutionMsg(''), 3000);
                } catch (err) {
                    console.error('집행내역 수정 오류:', err);
                    setExecutionMsg('수정 중 오류가 발생했습니다.');
                } finally {
                    setExecutionSaving(false);
                }
            };

            const handleDeleteExecution = async (id) => {
                try {
                    await supabase.from('attachments').delete().eq('execution_id', id);
                    const { error } = await supabase.from('budget_executions').delete().eq('id', id);
                    if (error) throw error;
                    setExecutionDeleteId(null);
                    await refreshExecutions();
                } catch (err) {
                    console.error('집행내역 삭제 오류:', err);
                }
            };

            const handleChangeExecutionStatus = async (id, newStatus) => {
                try {
                    const { error } = await supabase.from('budget_executions')
                        .update({ status: newStatus }).eq('id', id);
                    if (error) throw error;
                    await refreshExecutions();
                } catch (err) {
                    console.error('상태 변경 오류:', err);
                }
            };

            const handleExportExcel = (selectedOnly = false) => {
                if (!window.XLSX) { alert('Excel 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.'); return; }
                const executions = selectedOnly ? filteredExecutions.filter(e => selectedExecIds.has(e.id)) : filteredExecutions;
                if (executions.length === 0) { alert('내보낼 데이터가 없습니다.'); return; }
                const rows = executions.map(e => ({
                    '집행일': e.execution_date || '',
                    '대분류': e.category_name || '',
                    '소분류': e.subcategory_name || '',
                    '항목명': e.budget_item_name || '',
                    '유형': e.type || '',
                    '금액(원)': e.amount || 0,
                    '결제방법': e.payment_method || '',
                    '수급자': e.recipient || '',
                    '상태': EXECUTION_STATUS[e.status]?.label || e.status || ''
                }));
                const ws = window.XLSX.utils.json_to_sheet(rows);
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, '집행내역');
                window.XLSX.writeFile(wb, `집행내역_${new Date().toISOString().slice(0, 10)}.xlsx`);
            };

            const handleGalleryZipDownload = async (galleriesArg) => {
                if (!window.JSZip) { alert('JSZip 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.'); return; }
                setGalleryZipping(true);
                try {
                    const zip = new window.JSZip();
                    const galleries = galleriesArg || [];
                    // Fetch all attachment metadata in parallel
                    const attsByGallery = await Promise.all(
                        galleries.map(item =>
                            supabase.from('attachments')
                                .select('file_path, file_name')
                                .eq('gallery_id', item.id)
                                .not('file_type', 'eq', 'document')
                                .then(({ data }) => ({ item, atts: data || [] }))
                        )
                    );
                    for (const { item, atts } of attsByGallery) {
                        for (const att of atts) {
                            try {
                                const { data: blob } = await supabase.storage
                                    .from('attachments').download(att.file_path);
                                if (blob) {
                                    const safeTitle = (item.title || '기타').replace(/[/\\:*?"<>|]/g, '_');
                                    const safeFilename = (att.file_name || 'image').replace(/[/\\:*?"<>|]/g, '_');
                                    zip.file(`${safeTitle}/${safeFilename}`, blob);
                                }
                            } catch (e) {
                                console.warn('파일 다운로드 실패:', att.file_path, e);
                            }
                        }
                    }
                    const blob = await zip.generateAsync({ type: 'blob' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `갤러리_${new Date().toISOString().slice(0, 10)}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (err) {
                    console.error('ZIP 생성 오류:', err);
                    alert('ZIP 생성 중 오류가 발생했습니다.');
                } finally {
                    setGalleryZipping(false);
                }
            };

            // ── 수급자 목록 로딩 ─────────────────────────────────────────
            const loadRecipients = async () => {
                setRecipientsLoading(true);
                try {
                    const { data, error } = await supabase
                        .from('recipients')
                        .select('id, name, birth_date, address, phone, notes, is_active, created_at')
                        .eq('is_active', true)
                        .order('name');
                    if (error) throw error;
                    setRecipients(data || []);
                } catch (err) {
                    console.error('Error loading recipients:', err);
                    setRecipientMsg({ type: 'error', text: '수급자 목록을 불러오는 중 오류가 발생했습니다.' });
                } finally {
                    setRecipientsLoading(false);
                }
            };

            // ── 수급자 저장 (추가/수정) ──────────────────────────────────
            const handleSaveRecipient = async (e) => {
                e.preventDefault();
                setRecipientMsg({ type: '', text: '' });
                if (!recipientForm.name.trim()) {
                    setRecipientMsg({ type: 'error', text: '성명은 필수 입력 항목입니다.' });
                    return;
                }
                try {
                    if (editingRecipient) {
                        const { error } = await supabase
                            .from('recipients')
                            .update({ ...recipientForm, updated_at: new Date().toISOString() })

                    const bodyMatch = fullHtml.match(/<body[^>]*>([\s\S]*)<\/body>/i);

                    const cleanHtml = bodyHtml.replace(/<div class="no-print"[\s\S]*?<\/div>/gi, '');
                    try {

                                        {(() => { const selGalleries = (data.galleries || []).filter(g => selectedGalleryNewsletterIds.has(g.id));

                                                        <div style={{ flex: 1, height: 1, background: '#e5e7eb' }}></div>
                                                    </div>

                                                <div style={{ display: 'grid', gridTemplateColumns: newsletterTemplate === 'modern' ? 'repeat(3, 1fr)' : 'repeat(2, 1fr)', gap: 8 }}>
                                                    {selGalleries.map(g => (
                                                        <div key={g.id} style={{
                                                            borderRadius: newsletterTemplate === 'classic' ? 0 : 10,
                                                            overflow: 'hidden',
                                                            border: newsletterTemplate === 'classic' ? '1px solid #d1d5db' : '1px solid #f0f0f0',
                                                            background: '#fff'
                                                        }}>
                                                            {galleryThumbUrls[g.id] ? <img src={galleryThumbUrls[g.id]} alt="" style={{ width: '100%', height: 90, objectFit: 'cover' }} />
                                                                : <div style={{ width: '100%', height: 90, background: '#f5f5f5', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#ccc', fontSize: 20 }}>📷</div>}
                                                            <div style={{ padding: '5px 8px', fontSize: 10, fontWeight: 600, color: '#1e1e2e' }}>{g.title}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ); })()}

                                        {/* Closing */}
                                        {newsletterConfig.closing && (
                                            <div style={NL_STYLES.closing[T]}>
                                                {newsletterConfig.closing}
                                            </div>
                                        )}
                                        </div>

                                        {/* Empty state */}
                                        {selectedSchedules.length === 0 && selectedBoardsArr.length === 0 && !newsletterConfig.greeting && !newsletterConfig.closing && (
                                            <div style={{ textAlign: 'center', color: '#ccc', padding: '60px 20px' }}>
                                                <p style={{ fontSize: 32, marginBottom: 8 }}>📰</p>
                                                <p>일정이나 게시글을 선택하면 미리보기가 표시됩니다</p>
                                            </div>
                                        )}

                                        {/* Footer */}
                                        <div style={NL_STYLES.footer[T]}>
                                            {NL_STYLES.footerOrg[T] ? (
                                                <>
                                                <div style={NL_STYLES.footerOrg[T]}>{DEFAULT_ORG_NAME}</div>
                                                <div style={{ fontSize: 10, color: T === 'magazine' ? '#94a3b8' : '#9ca3af', marginTop: T === 'classic' ? 6 : 4, fontStyle: T === 'classic' ? 'italic' : 'normal' }}>
                                                    {T === 'classic' ? '본 뉴스레터는 아름다운재단 2026 공익단체 인큐베이팅 지원사업으로 제작되었습니다.' : '아름다운재단 2026 공익단체 인큐베이팅 지원사업'}
                                                </div>
                                                </>
                                            ) : (
                                                <div style={{ fontSize: 11, color: '#aaa', padding: '0 20px 12px' }}>
                                                    {DEFAULT_ORG_NAME} · 아름다운재단 2026 공익단체 인큐베이팅 지원사업
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    ); })()}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // ===== School management page =====
            // URL safety check (prevent javascript: XSS)
            const isSafeUrl = (url) => {
                if (!url) return false;
                try { const u = new URL(url); return ['http:', 'https:'].includes(u.protocol); } catch { return false; }
            };

            // Timetable helpers
            const SAFETY_KEYWORDS = ['안전', '보건', '직업생활', '산업', '화학', '실습', '하드웨어'];
            const isSafetySubject = (subj) => SAFETY_KEYWORDS.some(k => subj && subj.includes(k));

            const getWeekDates = (baseDate) => {
                const d = new Date(baseDate + 'T12:00:00'); // noon to avoid timezone shift
                const day = d.getDay();
                const mon = new Date(d); mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
                const pad = n => String(n).padStart(2, '0');
                return Array.from({ length: 5 }, (_, i) => {
                    const date = new Date(mon); date.setDate(mon.getDate() + i);
                    return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}`;
                });
            };

            // NEIS API: use Vercel proxy, fallback to direct NEIS call for local dev
            const NEIS_FALLBACK_KEY = 'aab253d940424f76a2de2bb786524694';
            const isLocalDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

            const fetchNeisWithFallback = async (proxyUrl, directNeisUrl) => {
                if (!isLocalDev) {
                    return await fetch(proxyUrl);
                }
                // Local dev: try proxy first, fallback to direct NEIS
                try {
                    const res = await fetch(proxyUrl);
                    if (res.ok) return res;
                } catch (e) { /* proxy not available, use fallback */ }
                return await fetch(directNeisUrl);
            };

            const loadTimetable = async (school, weekStart, grade, classNm) => {
                if (!school.neis_code || !school.neis_office_code) return;
                setTimetableLoading(true);
                setTimetableError('');
                try {
                    const dates = getWeekDates(weekStart);
                    const fromYmd = dates[0]; const toYmd = dates[4];
                    const proxyUrl = `/api/neis?action=timetable&office=${school.neis_office_code}&school=${school.neis_code}&from=${fromYmd}&to=${toYmd}${grade ? '&grade=' + grade : ''}${classNm ? '&class=' + classNm : ''}`;
                    const directUrl = `https://open.neis.go.kr/hub/hisTimetable?KEY=${NEIS_FALLBACK_KEY}&Type=json&pIndex=1&pSize=1000&ATPT_OFCDC_SC_CODE=${school.neis_office_code}&SD_SCHUL_CODE=${school.neis_code}&TI_FROM_YMD=${fromYmd}&TI_TO_YMD=${toYmd}${grade ? '&GRADE=' + grade : ''}${classNm ? '&CLASS_NM=' + classNm : ''}`;
                    const res = await fetchNeisWithFallback(proxyUrl, directUrl);
                    if (res.ok) {
                        const json = await res.json();
                        // Handle both proxy format (array) and direct NEIS format
                        let data;
                        if (Array.isArray(json)) {
                            data = json;
                        } else if (json.hisTimetable) {
                            data = json.hisTimetable[1].row.map(r => ({
                                date: r.ALL_TI_YMD || '', grade: r.GRADE || '', class: r.CLASS_NM || '',
                                period: r.PERIO || '', subject: r.ITRT_CNTNT || '', department: r.DDDEP_NM || ''
                            }));
                        } else { data = []; }
                        setTimetableData(data);
                        if (data.length === 0) setTimetableError('해당 기간의 시간표 데이터가 없습니다.');
                    } else {
                        setTimetableData([]);
                        setTimetableError('시간표를 불러올 수 없습니다. (응답 코드: ' + res.status + ')');
                    }
                } catch (e) {
                    console.error('Timetable load error:', e);
                    setTimetableData([]);
                    setTimetableError('시간표를 불러오는 중 오류가 발생했습니다.');
                }
                setTimetableLoading(false);
            };

            const searchSchoolFromNEIS = async (query) => {
                if (!query || query.length < 2) return;
                setNeisSearching(true);
                try {
                    const proxyUrl = `/api/neis?q=${encodeURIComponent(query)}`;
                    const directUrl = `https://open.neis.go.kr/hub/schoolInfo?KEY=${NEIS_FALLBACK_KEY}&Type=json&pIndex=1&pSize=10&SCHUL_NM=${encodeURIComponent(query)}`;
                    const res = await fetchNeisWithFallback(proxyUrl, directUrl);
                    if (!res.ok) { setNeisSearchResults([]); setNeisSearching(false); return; }
                    const json = await res.json();
                    let results;
                    if (Array.isArray(json)) {
                        results = json;
                    } else if (json.schoolInfo) {
                        results = json.schoolInfo[1].row.map(r => ({
                            name: r.SCHUL_NM, address: (r.ORG_RDNMA || '') + ' ' + (r.ORG_RDNDA || '').trim(),
                            phone: r.ORG_TELNO || '', fax: r.ORG_FAXNO || '', website: r.HMPG_ADRES || '',
                            education_office: r.ATPT_OFCDC_SC_NM || '', neis_code: r.SD_SCHUL_CODE || '',
                            neis_office_code: r.ATPT_OFCDC_SC_CODE || '', foundation_type: r.FOND_SC_NM || '',
                            coeducation: r.COEDU_SC_NM || '', founded_date: r.FOND_YMD || '',
                        }));
                    } else { results = []; }
                    setNeisSearchResults(results);
                } catch (e) { console.error('NEIS search error:', e); setNeisSearchResults([]); }
                setNeisSearching(false);
            };

            const resetSchoolForm = () => {
                setSchoolForm({ name: '', short_name: '', address: '', phone: '', fax: '', website: '', education_office: '', neis_code: '', neis_office_code: '', foundation_type: '', coeducation: '', founded_date: '', principal: '', contact_teacher: '', contact_teacher_phone: '', contact_teacher_email: '', departments: [], student_count: 0, student_count_by_grade: { '1학년': 0, '2학년': 0, '3학년': 0 }, notice_url: '', memo: '', status: 'active', partnership_date: '' });
                setNeisSearchQuery(''); setNeisSearchResults([]); setEditingSchool(null);
            };

            const handleSaveSchool = async () => {
                if (!schoolForm.name) { alert('학교명을 입력해주세요.'); return; }
                const grade = schoolForm.student_count_by_grade || {};
                const total = Object.values(grade).reduce((s, v) => s + (parseInt(v) || 0), 0);
                const payload = { ...schoolForm, student_count: total, student_count_by_grade: grade };
                // Clean up fields for Supabase
                delete payload.id;
                if (!payload.departments || !Array.isArray(payload.departments)) payload.departments = [];
                if (!payload.partnership_date) payload.partnership_date = null;
                if (!payload.student_count_by_grade || typeof payload.student_count_by_grade !== 'object') payload.student_count_by_grade = {};

                let error;
                if (editingSchool) {
                    ({ error } = await supabase.from('schools').update(payload).eq('id', editingSchool.id));
                } else {
                    ({ error } = await supabase.from('schools').insert([payload]));
                }
                if (error) { alert('저장 실패: ' + error.message); console.error('School save error:', error); return; }
                const { data: rows } = await supabase.from('schools').select('*').order('name');
                if (rows) setSchoolsData(rows);
                resetSchoolForm(); setSchoolView('list');
            };

            const handleDeleteSchool = async (id) => {
                if (!confirm('정말 삭제하시겠습니까? 관련 교과서 정보도 함께 삭제됩니다.')) return;
                await supabase.from('schools').delete().eq('id', id);
                const { data: rows } = await supabase.from('schools').select('*').order('name');
                if (rows) setSchoolsData(rows);
                setSchoolView('list'); setSelectedSchool(null);
            };

            const handleSaveTextbook = async (schoolId) => {
                if (!textbookForm.textbook_name) { alert('교과서명을 입력해주세요.'); return; }
                await supabase.from('school_textbooks').insert([{ school_id: schoolId, ...textbookForm }]);
                const { data: tbRows } = await supabase.from('school_textbooks').select('*');
                if (tbRows) setSchoolTextbooks(tbRows);
                setTextbookForm({ textbook_name: '', subject: '', publisher: '', year: 2026, is_safety_related: false, our_textbook: false, distribution_status: 'planned', quantity: 0 });
                setShowTextbookForm(false);
            };

            const handleDeleteTextbook = async (id) => {
                if (!confirm('교과서를 삭제하시겠습니까?')) return;
                await supabase.from('school_textbooks').delete().eq('id', id);
                const { data: tbRows } = await supabase.from('school_textbooks').select('*');
                if (tbRows) setSchoolTextbooks(tbRows);
            };

            const renderSchools = () => {
                // Write view
                if (schoolView === 'write') {
                    return (
                        <div>
                            <h1 className="section-title">🏫 {editingSchool ? '학교 수정' : '학교 등록'}</h1>
                            <div className="card" style={{ padding: 20, marginBottom: 16 }}>
                                <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>🔍 NEIS 학교 검색</h3>
                                <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
                                    <input type="text" placeholder="학교명을 입력하세요 (예: 인천전자마이스터)" value={neisSearchQuery}
                                        onChange={e => setNeisSearchQuery(e.target.value)}
                                        onKeyDown={e => { if (e.key === 'Enter') searchSchoolFromNEIS(neisSearchQuery); }}
                                        style={{ flex: 1, padding: '8px 12px', border: '1px solid #ddd', borderRadius: 8, fontSize: 14 }} />
                                    <button className="btn btn-primary" onClick={() => searchSchoolFromNEIS(neisSearchQuery)}
                                        disabled={neisSearching} style={{ padding: '8px 20px', whiteSpace: 'nowrap' }}>
                                        {neisSearching ? '검색 중...' : '🔍 NEIS 검색'}
                                    </button>
                                </div>
                                {neisSearchResults.length > 0 && (
                                    <div style={{ maxHeight: 200, overflowY: 'auto', marginBottom: 12 }}>
                                        {neisSearchResults.map((r, i) => (
                                            <div key={i} className={`school-neis-result ${schoolForm.neis_code === r.neis_code ? 'selected' : ''}`}
                                                role="button" tabIndex={0}
                                                onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setSchoolForm(prev => ({ ...prev, ...r, short_name: prev.short_name || r.name.replace(/등학교$/, '') })); setNeisSearchResults([]); } }}
                                                onClick={() => {
                                                    setSchoolForm(prev => ({ ...prev, ...r, short_name: prev.short_name || r.name.replace(/등학교$/, '') }));
                                                    setNeisSearchResults([]);
                                                }}>
                                                <div style={{ fontWeight: 600, fontSize: 14 }}>{r.name}</div>
                                                <div style={{ fontSize: 12, color: '#9C9690' }}>{r.address} · {r.education_office} · {r.foundation_type}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            <div className="card" style={{ padding: 20, marginBottom: 16 }}>
                                <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>📋 기본정보</h3>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                                    <div className="schedule-form-group"><label>학교명 *</label>
                                        <input type="text" value={schoolForm.name} onChange={e => setSchoolForm(p => ({...p, name: e.target.value}))} /></div>
                                    <div className="schedule-form-group"><label>약칭</label>
                                        <input type="text" value={schoolForm.short_name} onChange={e => setSchoolForm(p => ({...p, short_name: e.target.value}))} /></div>
                                    <div className="schedule-form-group" style={{ gridColumn: 'span 2' }}><label>주소</label>
                                        <input type="text" value={schoolForm.address} onChange={e => setSchoolForm(p => ({...p, address: e.target.value}))} /></div>
                                    <div className="schedule-form-group"><label>전화</label>
                                        <input type="text" value={schoolForm.phone} onChange={e => setSchoolForm(p => ({...p, phone: e.target.value}))} /></div>
                                    <div className="schedule-form-group"><label>FAX</label>
                                        <input type="text" value={schoolForm.fax} onChange={e => setSchoolForm(p => ({...p, fax: e.target.value}))} /></div>
                                    <div className="schedule-form-group" style={{ gridColumn: 'span 2' }}><label>홈페이지</label>
                                        <input type="text" value={schoolForm.website} onChange={e => setSchoolForm(p => ({...p, website: e.target.value}))} /></div>
                                    <div className="schedule-form-group"><label>교육청</label>
                                        <input type="text" value={schoolForm.education_office} readOnly style={{ background: '#f8f6f1' }} /></div>
                                    <div className="schedule-form-group"><label>설립구분</label>
                                        <input type="text" value={schoolForm.foundation_type} readOnly style={{ background: '#f8f6f1' }} /></div>
                                </div>
                            </div>

                            <div className="card" style={{ padding: 20, marginBottom: 16 }}>
                                <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>👨‍🏫 담당교사 · 학교정보</h3>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                                    <div className="schedule-form-group"><label>교장</label>
                                        <input type="text" value={schoolForm.principal} onChange={e => setSchoolForm(p => ({...p, principal: e.target.value}))} /></div>
                                    <div className="schedule-form-group"><label>담당교사</label>
                                        <input type="text" value={schoolForm.contact_teacher} onChange={e => setSchoolForm(p => ({...p, contact_teacher: e.target.value}))} /></div>
                                    <div className="schedule-form-group"><label>담당교사 전화</label>
                                        <input type="text" value={schoolForm.contact_teacher_phone} onChange={e => setSchoolForm(p => ({...p, contact_teacher_phone: e.target.value}))} /></div>
                                    <div className="schedule-form-group"><label>담당교사 이메일</label>
                                        <input type="text" value={schoolForm.contact_teacher_email} onChange={e => setSchoolForm(p => ({...p, contact_teacher_email: e.target.value}))} /></div>
                                </div>
                                <div className="schedule-form-group" style={{ marginTop: 12 }}>
                                    <label>전공 (콤마로 구분)</label>
                                    <input type="text" placeholder="반도체설계, 반도체공정, 반도체장비"
                                        value={(schoolForm.departments || []).join(', ')}
                                        onChange={e => setSchoolForm(p => ({...p, departments: e.target.value.split(',').map(s => s.trim()).filter(Boolean)}))} />
                                </div>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginTop: 12 }}>
                                    <div className="schedule-form-group"><label>1학년</label>
                                        <input type="number" value={schoolForm.student_count_by_grade['1학년'] || 0}
                                            onChange={e => setSchoolForm(p => ({...p, student_count_by_grade: {...p.student_count_by_grade, '1학년': parseInt(e.target.value) || 0}}))} /></div>
                                    <div className="schedule-form-group"><label>2학년</label>
                                        <input type="number" value={schoolForm.student_count_by_grade['2학년'] || 0}
                                            onChange={e => setSchoolForm(p => ({...p, student_count_by_grade: {...p.student_count_by_grade, '2학년': parseInt(e.target.value) || 0}}))} /></div>
                                    <div className="schedule-form-group"><label>3학년</label>
                                        <input type="number" value={schoolForm.student_count_by_grade['3학년'] || 0}
                                            onChange={e => setSchoolForm(p => ({...p, student_count_by_grade: {...p.student_count_by_grade, '3학년': parseInt(e.target.value) || 0}}))} /></div>
                                </div>
                                <div style={{ fontSize: 13, color: '#6B6560', marginTop: 4 }}>
                                    합계: {Object.values(schoolForm.student_count_by_grade || {}).reduce((s, v) => s + (parseInt(v) || 0), 0)}명
                                </div>
                            </div>

                            <div className="card" style={{ padding: 20, marginBottom: 16 }}>
                                <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>📎 기타</h3>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                                    <div className="schedule-form-group"><label>공지사항 URL</label>
                                        <input type="text" placeholder="https://..." value={schoolForm.notice_url} onChange={e => setSchoolForm(p => ({...p, notice_url: e.target.value}))} /></div>
                                    <div className="schedule-form-group"><label>협력 시작일</label>
                                        <input type="date" value={schoolForm.partnership_date} onChange={e => setSchoolForm(p => ({...p, partnership_date: e.target.value}))} /></div>
                                </div>
                                <div className="schedule-form-group" style={{ marginTop: 12 }}><label>메모</label>
                                    <textarea rows={3} value={schoolForm.memo} onChange={e => setSchoolForm(p => ({...p, memo: e.target.value}))}
                                        style={{ width: '100%', padding: 8, border: '1px solid #ddd', borderRadius: 6, fontSize: 13, resize: 'vertical' }} /></div>
                                <div style={{ marginTop: 12 }}>
                                    <label style={{ fontSize: 13, display: 'flex', gap: 8, alignItems: 'center' }}>
                                        <span>상태:</span>
                                        <select value={schoolForm.status} onChange={e => setSchoolForm(p => ({...p, status: e.target.value}))}
                                            style={{ padding: '4px 8px', border: '1px solid #ddd', borderRadius: 6 }}>
                                            <option value="active">활동</option>
                                            <option value="inactive">비활동</option>
                                        </select>
                                    </label>
                                </div>
                            </div>

                            <div style={{ display: 'flex', gap: 8 }}>
                                <button className="btn btn-primary" onClick={handleSaveSchool}>💾 저장</button>
                                <button className="btn btn-secondary" onClick={() => { resetSchoolForm(); setSchoolView('list'); }}>취소</button>
                            </div>
                        </div>
                    );
                }

                // Detail view
                if (schoolView === 'detail' && selectedSchool) {
                    const school = selectedSchool;
                    const tbs = schoolTextbooks.filter(t => t.school_id === school.id);
                    const relatedSchedules = (data.schedules || []).filter(s => {
                        const t = s.title || ''; const l = s.location || '';
                        const sn = school.short_name || ''; const fn = school.name || '';
                        return (sn && (t.includes(sn) || l.includes(sn))) || (fn && (t.includes(fn) || l.includes(fn)));
                    });
                    return (
                        <div>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                                <button className="btn btn-secondary" onClick={() => { setSchoolView('list'); setSelectedSchool(null); }}>← 목록으로</button>
                                {currentUser?.role === 'admin' && (
                                    <div style={{ display: 'flex', gap: 8 }}>
                                        <button className="btn btn-primary" onClick={() => {
                                            setSchoolForm({ ...school, student_count_by_grade: school.student_count_by_grade || { '1학년': 0, '2학년': 0, '3학년': 0 }, departments: school.departments || [] });
                                            setEditingSchool(school); setSchoolView('write');
                                        }}>✏️ 수정</button>

                            const handleDeleteProject = async (projId) => {

                            };
                            const handleSaveCurrentAsProject = async () => {
                                const name = prompt('프로젝트 이름:', BUDGET_DATA.projectName);
                                if (!name) return;
                                try {
                                    const session = JSON.parse(localStorage.getItem('bf_user_session') || '{}');

                                        name,
                                        organization: DEFAULT_ORG_NAME,
                                        year: 2026,
                                        period: BUDGET_DATA.period,
                                        total_budget: BUDGET_DATA.totalBudget,
                                        budget_data: BUDGET_DATA,
                                        config: CONFIG,
                                        modules: [...COMMON_MODULES.map(m => m.id), ...CUSTOM_MODULES.map(m => m.id)],
                                        module_config: { schools: { label: '학교관리', icon: '🏫' } },
                                        is_active: projectsList.length === 0,
                                        created_by: session.id || null
                                    }]).select().single();
                                    if (error) throw error;
                                    setProjectsList(prev => [inserted, ...prev]);
                                    if (projectsList.length === 0) { setActiveProject(inserted); setActiveBudgetData(inserted.budget_data); }
                                    alert('현재 예산구조가 프로젝트로 저장되었습니다.');
                                } catch (err) { alert('저장 오류: ' + err.message); }
                            };
                            const handleExcelProjectUpload = (e) => {
                                const file = e.target.files[0];
                                if (!file || !window.XLSX) { alert('엑셀 라이브러리 로딩 중입니다.'); return; }
                                const reader = new FileReader();
                                reader.onload = (evt) => {
                                    try {
                                        const wb = window.XLSX.read(evt.target.result, { type: 'array' });
                                        const ws = wb.Sheets[wb.SheetNames[0]];
                                        const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
                                        // Find header row
                                        let hIdx = 0;
                                        for (let i = 0; i < Math.min(rows.length, 10); i++) {
                                            const nonEmpty = rows[i].filter(c => c !== '' && c != null).length;
                                            if (nonEmpty >= 4) { hIdx = i; break; }
                                        }
                                        const headers = rows[hIdx].map(h => String(h || '').trim());
                                        const dataRows = rows.slice(hIdx + 1).filter(r => r.some(c => c !== '' && c != null));
                                        // Auto-detect columns
                                        const colIdx = { cat: -1, sub: -1, item: -1, type: -1, budget: -1, h1: -1, h2: -1, detail: -1 };
                                        headers.forEach((h, i) => {
                                            const hl = h.toLowerCase();
                                            if (hl.includes('대분류') || hl === '분류') colIdx.cat = i;
                                            else if (hl.includes('소분류') || hl.includes('세부')) colIdx.sub = i;
                                            else if (hl.includes('항목') || hl.includes('내역')) colIdx.item = i;
                                            else if (hl.includes('유형') || hl.includes('과목')) colIdx.type = i;
                                            else if (hl.includes('총') && hl.includes('예산') || hl === '예산액') colIdx.budget = i;
                                            else if (hl.includes('상반기') || hl.includes('1차')) colIdx.h1 = i;
                                            else if (hl.includes('하반기') || hl.includes('2차')) colIdx.h2 = i;
                                            else if (hl.includes('산출') || hl.includes('내역') || hl.includes('비고')) colIdx.detail = i;
                                        });
                                        // Build tree
                                        const catMap = {};
                                        let lastCat = '', lastSub = '';
                                        const toNum = (v) => parseInt(String(v).replace(/[,\s원₩]/g, '')) || 0;
                                        dataRows.forEach(r => {
                                            const cat = String(r[colIdx.cat] || '').trim() || lastCat;
                                            const sub = String(r[colIdx.sub] || '').trim() || lastSub;
                                            const item = String(r[colIdx.item] || '').trim();
                                            if (cat) lastCat = cat;
                                            if (sub) lastSub = sub;
                                            if (!item) return;
                                            if (!catMap[cat]) catMap[cat] = { name: cat, subs: {} };
                                            if (!catMap[cat].subs[sub]) catMap[cat].subs[sub] = { name: sub, items: [] };
                                            catMap[cat].subs[sub].items.push({
                                                name: item,
                                                type: String(r[colIdx.type] || '').trim() || '일반지출',
                                                budget: toNum(r[colIdx.budget]),
                                                h1: colIdx.h1 >= 0 ? toNum(r[colIdx.h1]) : 0,
                                                h2: colIdx.h2 >= 0 ? toNum(r[colIdx.h2]) : 0,
                                                detail: colIdx.detail >= 0 ? String(r[colIdx.detail] || '') : ''
                                            });
                                        });
                                        // Convert to BUDGET_DATA format
                                        const categories = Object.entries(catMap).map(([_, cv], ci) => {
                                            const subcategories = Object.entries(cv.subs).map(([__, sv], si) => {
                                                const items = sv.items.map((it, ii) => ({
                                                    id: `item-${ci}-${si}-${ii}`,
                                                    name: it.name, type: it.type, budget: it.budget, h1: it.h1, h2: it.h2, detail: it.detail
                                                }));
                                                const subBudget = items.reduce((s, i) => s + i.budget, 0);
                                                return { id: `sub-${ci}-${si}`, name: sv.name, budget: subBudget, h1: items.reduce((s, i) => s + i.h1, 0), h2: items.reduce((s, i) => s + i.h2, 0), description: '', items };
                                            });
                                            const catBudget = subcategories.reduce((s, sc) => s + sc.budget, 0);
                                            return { id: `cat-${ci}`, name: cv.name, budget: catBudget, h1: subcategories.reduce((s, sc) => s + sc.h1, 0), h2: subcategories.reduce((s, sc) => s + sc.h2, 0), description: '', subcategories };
                                        });
                                        const totalBudget = categories.reduce((s, c) => s + c.budget, 0);
                                        // Prompt for project info
                                        const pName = prompt('프로젝트 이름:', file.name.replace(/\.[^.]+$/, ''));
                                        if (!pName) return;
                                        const pOrg = prompt('단체명:', '');
                                        if (!pOrg) return;
                                        const pYear = parseInt(prompt('사업년도:', String(new Date().getFullYear()))) || new Date().getFullYear();
                                        const budgetData = {
                                            projectName: pName, organization: pOrg, totalBudget,
                                            period: `${pYear}.01 ~ ${pYear}.12`,
                                            periods: { total: { label: `${pYear}년도 전체`, budget: totalBudget }, h1: { label: '상반기', budget: categories.reduce((s, c) => s + c.h1, 0) }, h2: { label: '하반기', budget: categories.reduce((s, c) => s + c.h2, 0) } },
                                            categories
                                        };
                                        // Save to Supabase
                                        const session = JSON.parse(localStorage.getItem('bf_user_session') || '{}');
                                        const modules = COMMON_MODULES.map(m => m.id);
                                        supabase.from('projects').insert([{
                                            name: pName, organization: pOrg, year: pYear,
                                            period: budgetData.period, total_budget: totalBudget,
                                            budget_data: budgetData, config: CONFIG, modules,
                                            module_config: {}, is_active: false, created_by: session.id || null
                                        }]).select().single().then(({ data: ins, error }) => {
                                            if (error) { alert('저장 오류: ' + error.message); return; }
                                            setProjectsList(prev => [ins, ...prev]);
                                            alert(`프로젝트 "${pName}" 생성 완료!\n카테고리 ${categories.length}개, 항목 ${categories.reduce((s, c) => s + c.subcategories.reduce((ss, sc) => ss + sc.items.length, 0), 0)}개 파싱됨.`);
                                        });
                                    } catch (err) { alert('파싱 오류: ' + err.message); }
                                };
                                reader.readAsArrayBuffer(file);
                                e.target.value = '';
                            };
                            const handleCloneProject = async (proj) => {
                                const newYear = parseInt(prompt('새 사업년도:', String(proj.year + 1)));
                                if (!newYear) return;
                                try {
                                    const session = JSON.parse(localStorage.getItem('bf_user_session') || '{}');
                                    const newBudget = {...proj.budget_data, period: `${newYear}.01 ~ ${newYear}.12`,
                                        periods: {...proj.budget_data.periods, total: {...proj.budget_data.periods.total, label: `${newYear}년도 전체`}}};
                                    const { data: ins, error } = await supabase.from('projects').insert([{
                                        name: proj.name.replace(String(proj.year), String(newYear)),
                                        organization: proj.organization, year: newYear,
                                        period: `${newYear}.01 ~ ${newYear}.12`, total_budget: proj.total_budget,
                                        budget_data: newBudget, config: proj.config,
                                        modules: proj.modules, module_config: proj.module_config,
                                        is_active: false, created_by: session.id || null
                                    }]).select().single();
                                    if (error) throw error;
                                    setProjectsList(prev => [ins, ...prev]);
                                    alert(`${newYear}년도 프로젝트가 복제되었습니다.`);

                                    <div style={{ display: 'flex', gap: 8 }}>

                                            📥 엑셀 업로드
                                        </button>
                                    </div>

                                            <span style={{ fontSize: 16, fontWeight: 700, color: '#065f46' }}>{activeProject.name}</span>
                                        </div>
                                        <div style={{ fontSize: 13, color: '#047857' }}>{activeProject.organization} · {activeProject.year}년 · 총 예산 {fmt(activeProject.total_budget)}원</div>

                                    </div>
                                )}

                                {/* Project list */}
                                {projectsList.length === 0 ? (
                                    <div style={{ textAlign: 'center', padding: '40px 20px', color: '#999' }}>

                                                padding: 16, borderRadius: 12, border: proj.is_active ? '2px solid #059669' : '1px solid #e5e7eb',

                                            }}>
                                                <div style={{ flex: 1 }}>
                                                    <div style={{ fontSize: 15, fontWeight: 600, color: '#1e293b', marginBottom: 4 }}>
                                                        {proj.is_active && <span style={{ marginRight: 6 }}>✅</span>}
                                                        {proj.name}
                                                    </div>
                                                    <div style={{ fontSize: 12, color: '#6b7280' }}>
                                                        {proj.organization} · {proj.year}년 · {fmt(proj.total_budget)}원

                                                </div>

                                                    {!proj.is_active && (
                                                        <button className="btn btn-primary" style={{ fontSize: 11, padding: '5px 12px' }} onClick={() => handleActivateProject(proj.id)}>
                                                            활성화
                                                        </button>
                                                    )}
                                                    <button className="btn btn-secondary" style={{ fontSize: 11, padding: '5px 10px' }} onClick={() => handleCloneProject(proj)}>
                                                        📋 복제
                                                    </button>
                                                    {!proj.is_active && (
                                                        <button style={{ fontSize: 11, padding: '5px 10px', border: '1px solid #fca5a5', borderRadius: 6, background: '#fff', color: '#dc2626', cursor: 'pointer' }} onClick={() => handleDeleteProject(proj.id)}>
                                                            삭제
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            );
                        })()}

                        {/* ── F-04: 활동 로그 탭 ─────────────────────────────────────── */}
                        {adminTab === 'logs' && (
                                <div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                                        <h3 style={{ fontSize: 18, fontWeight: 600, margin: 0 }}>📜 활동 로그</h3>
                                        <button className="btn btn-secondary" style={{ fontSize: 12, padding: '6px 12px' }} onClick={loadActivityLogs}>🔄 새로고침</button>
                                    </div>
                                    {/* F-04: 필터링 */}
                                    <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap' }}>
                                        <select className="form-input" style={{ width: 'auto', fontSize: 13 }} value={logFilterUser} onChange={e => setLogFilterUser(e.target.value)}>
                                            <option value="">사용자 전체</option>
                                            {[...new Set(activityLogs.map(l => l.user_name).filter(Boolean))].map(u => (
                                                <option key={u} value={u}>{u}</option>
                                            ))}
                                        </select>
                                        <select className="form-input" style={{ width: 'auto', fontSize: 13 }} value={logFilterAction} onChange={e => setLogFilterAction(e.target.value)}>

                                            <option value="등록">등록</option>
                                            <option value="수정">수정</option>
                                            <option value="삭제">삭제</option>
                                            <option value="승인">승인</option>
                                            <option value="댓글">댓글</option>

                                        <input type="date" className="form-input" style={{ width: 'auto', fontSize: 13 }} value={logFilterDateTo} onChange={e => setLogFilterDateTo(e.target.value)} title="종료일" />

                                            {filteredLogs.map(log => (

                                                    <div style={{ flex: 1 }}>
                                                        <div style={{ fontSize: 14, fontWeight: 500, color: '#2D3748' }}>{log.action}</div>

                                                        <div style={{ fontSize: 11, color: '#A0AEC0', marginTop: 4 }}>
                                                            {log.user_name || '시스템'} • {new Date(log.created_at).toLocaleString('ko-KR')}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                        )}
                    </div>
                );
            };

            const renderContent = () => {
                if (loading) {
                    return (
                        <div className="loading">
                            <div className="loading-spinner"></div>
                            <div>데이터를 불러오고 있습니다...</div>
                        </div>
                    );
                }

                if (error) {
                    return (
                        <div>
                            <div className="error-message">
                                {error}
                            </div>
                            <button
                                className="btn btn-primary"
                                onClick={() => window.location.reload()}

                                다시 시도
                            </button>
                        </div>
                    );
                }

                switch(currentPage) {
                    case "dashboard": return renderDashboard();
                    case "budget": return renderBudget();
                    case "schedule": return renderSchedule();
                    case "gallery": return renderGallery();
                    case "board": return renderBoard();
                    case "guide": return renderGuide();
                    case "newsletter": return renderNewsletter();
                    case "schools": return renderSchools();
                    case "admin": return currentUser?.role === 'admin' ? renderAdmin() : renderDashboard();
                    default: return renderDashboard();
                }

            // 로그인 안 된 경우 로그인 페이지 표시

            return (

                                <p style={{ margin: '8px 0 0 0', fontSize: '15px', opacity: 0.9 }}>
