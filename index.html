<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#134E42">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>아름다운재단 2026 공익단체 인큐베이팅 지원사업 관리시스템</title>

    <!-- React 및 Babel CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Supabase 클라이언트 -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- DOMPurify: XSS 방어용 HTML 새니타이저 -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

    <!-- JSZip: 파일 압축 (갤러리 ZIP 다운로드) -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

    <!-- SheetJS: Excel 내보내기 -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <!-- Google Calendar API -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <!-- html2pdf.js: HTML → PDF 직접 다운로드 (jsPDF + html2canvas 통합) -->
    <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>

    <!-- Pretendard Font (for newsletter templates) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

    <!-- App Styles -->
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div id="offline-banner" class="offline-banner">📡 오프라인 상태 — 인터넷 연결을 확인해주세요</div>
    <div id="root">
        <div class="loading">
            <div class="loading-spinner"></div>
            <div>시스템을 초기화하고 있습니다...</div>
        </div>
    </div>

    <!-- App Modules (Babel transpiled) -->
    <script type="text/babel" src="js/config.js"></script>
    <script type="text/babel" src="js/documents.jsx"></script>
    <script type="text/babel" src="js/LoginPage.jsx"></script>
    <script type="text/babel" src="js/app.jsx"></script>

    <!-- Service Worker & Offline Support -->
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/service-worker.js').catch(function(){});
        window.addEventListener('online', function(){
            document.getElementById('offline-banner').className='offline-banner';
            setTimeout(function(){ window.location.reload(); }, 500);
        });
        window.addEventListener('offline', function(){ document.getElementById('offline-banner').className='offline-banner show'; });
    </script>
</body>
</html>
