                const incomeTax = Math.round(amount * 0.08);
                const localTax = Math.round(incomeTax * 0.1);
                return {
                    income: incomeTax,
                    local: localTax,
                    total: incomeTax + localTax,
                    net: amount - (incomeTax + localTax)
                };
            };

            const getRequiredDocuments = (type, paymentMethod) => {
                if (!DOCUMENT_RULES[type]) return [];

                const rule = DOCUMENT_RULES[type];
                let docs = [...rule.base, ...rule.always];

                if (paymentMethod === '카드') {
                    docs.push(...rule.card);
                } else {
                    docs.push(...rule.transfer);
                }

                if (rule.withholding) {
                    docs.push(...rule.withholdingDocs);
                }

                return docs;
            };

                    });
                });
                return subcategories;

                                            value={formData.description}
                                            onChange={(e) => setFormData({...formData, description: e.target.value})}
                                        />
                                    </div>

                                    {/* 필요 서류 안내 */}
                                    {formData.type && (
                                        <div style={{
                                            background: '#F8F9FA',
                                            border: '1px solid #E2E8F0',
                                            borderRadius: '8px',
                                            padding: '16px',
                                            marginTop: '24px'
                                        }}>
                                            <h4 style={{ margin: '0 0 12px 0', fontSize: '16px' }}>
                                                📄 필요 증빙서류
                                            </h4>
                                            <div>
                                                {getRequiredDocuments(formData.type, formData.payment_method).map((doc, index) => (
                                                    <div key={index} style={{
                                                        padding: '4px 0',
                                                        fontSize: '14px'
                                                    }}>
                                                        ✓ {doc}
                                                    </div>
                                                ))}
                                            </div>
                                            {DOCUMENT_RULES[formData.type]?.notes && (
                                                <div style={{
                                                    marginTop: '12px',
                                                    padding: '8px',
                                                    background: 'rgba(27, 107, 90, 0.1)',
                                                    borderRadius: '4px',
                                                    fontSize: '13px',
                                                    whiteSpace: 'pre-line'
                                                }}>
                                                    💡 {DOCUMENT_RULES[formData.type].notes}
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    <div style={{
                                        display: 'flex',
                                        gap: '12px',
                                        marginTop: '24px'
                                    }}>
                                        <button
                                            className="btn btn-primary"
                                            onClick={() => {
                                                alert('집행 등록이 완료되었습니다.');
                                                setFormData({
                                                    subcategory_id: '',
                                                    subcategory_name: '',
                                                    category_name: '',
                                                    budget_item_id: '',
                                                    budget_item_name: '',
                                                    type: '',
                                                    description: '',
                                                    amount: '',
                                                    payment_method: '카드',
                                                    execution_date: new Date().toISOString().split('T')[0],
                                                    recipient: ''
                                                });
                                            }}
                                        >
                                            💾 등록하기
                                        </button>
                                        <button
                                            className="btn btn-secondary"
                                            onClick={() => {
                                                setFormData({
                                                    subcategory_id: '',
                                                    subcategory_name: '',
                                                    category_name: '',
                                                    budget_item_id: '',
                                                    budget_item_name: '',
                                                    type: '',
                                                    description: '',
                                                    amount: '',
                                                    payment_method: '카드',
                                                    execution_date: new Date().toISOString().split('T')[0],
                                                    recipient: ''
                                                });
                                            }}
                                        >
                                            🔄 초기화
                                        </button>
                                    </div>
                                </div>
                            )}

                            {budgetTab === 'calculator' && (
                                <div>
                                    <h2 style={{ fontSize: '20px', fontWeight: '600', marginBottom: '24px' }}>
                                        🧮 원천징수세 계산기
                                    </h2>

                                    <div className="form-grid" style={{ maxWidth: '500px' }}>
                                        <div className="form-group">
                                            <label>지급 금액</label>
                                            <input
                                                type="number"
                                                placeholder="금액 입력 (원)"
                                                value={calculatorAmount}
                                                onChange={(e) => setCalculatorAmount(e.target.value)}
                                            />
                                        </div>
                                    </div>

                                    <div style={{
                                        display: 'flex',
                                        gap: '12px',
                                        marginTop: '16px'
                                    }}>
                                        <button
                                            className="btn btn-primary"
                                            onClick={() => {
                                                if (calculatorAmount) {
                                                    const result = calculateWithholdingTax(parseInt(calculatorAmount));
                                                    setCalculationResult(result);
                                                }
                                            }}
                                        >
                                            📊 계산하기
                                        </button>
                                        <button
                                            className="btn btn-secondary"
                                            onClick={() => {
                                                setCalculatorAmount('');
                                                setCalculationResult(null);
                                            }}
                                        >
                                            🔄 초기화
                                        </button>
                                    </div>

                                    {calculationResult && (
                                        <div className="calculation-result">
                                            <h3 style={{ margin: '0 0 16px 0' }}>계산 결과</h3>
                                            <div className="result-item">
                                                <span>지급 금액:</span>
                                                <span>{parseInt(calculatorAmount).toLocaleString()}원</span>
                                            </div>
                                            <div className="result-item">
                                                <span>소득세 (8%):</span>
                                                <span>{calculationResult.income.toLocaleString()}원</span>
                                            </div>
                                            <div className="result-item">
                                                <span>지방소득세 (10%):</span>
                                                <span>{calculationResult.local.toLocaleString()}원</span>
                                            </div>
                                            <div className="result-item">
                                                <span>총 세액:</span>
                                                <span>{calculationResult.total.toLocaleString()}원</span>
                                            </div>
                                            <div className="result-item">
                                                <span>실수령액:</span>
                                                <span>{calculationResult.net.toLocaleString()}원</span>
                                            </div>
                                        </div>
                                    )}

                                    <div style={{
                                        marginTop: '24px',
                                        padding: '16px',
                                        background: '#F8F9FA',
                                        borderRadius: '8px',
                                        fontSize: '14px',
                                        color: '#6B6560'
                                    }}>
                                        <h4 style={{ margin: '0 0 8px 0' }}>💡 원천징수 기준</h4>
                                        <p>• 125,000원 이하: 원천징수 없음</p>
                                        <p>• 125,001원 이상: 소득세 8% + 지방소득세 10% (소득세의 10%)</p>
                                        <p>• 자문비, 사업인건비, 단순인건비에 적용</p>
                                    </div>
                                </div>
                            )}

                            {budgetTab === 'history' && (
                                <div>
                                    <h2 style={{ fontSize: '20px', fontWeight: '600', marginBottom: '24px' }}>
                                        📋 예산 집행 내역
                                    </h2>

                                    {data.budgetExecutions.map(execution => (
                                        <div key={execution.id} className="execution-item">
                                            <div className="execution-header">
                                                <div>
                                                    <div className="execution-title">{execution.budget_item_name}</div>
                                                    <div style={{ fontSize: '14px', color: '#6B6560' }}>
                                                        {execution.description}
                                                    </div>
                                                </div>
                                                <div className="execution-amount">
                                                    {execution.amount?.toLocaleString()}원
                                                </div>
                                            </div>
                                            <div className="execution-meta">
                                                <span>📅 {execution.execution_date}</span>
                                                <span>💳 {execution.payment_method}</span>
                                                <span>🏷️ {execution.category_name} > {execution.subcategory_name}</span>
                                                {execution.recipient && <span>👤 {execution.recipient}</span>}
                                            </div>
                                            {DOCUMENT_RULES[execution.type] && (
                                                <div className="documents-list">
                                                    <div style={{ fontWeight: '600', marginBottom: '8px' }}>필요 증빙서류:</div>
                                                    {getRequiredDocuments(execution.type, execution.payment_method).map((doc, index) => (
                                                        <div key={index} className="document-item">
                                                            <span>📄 {doc}</span>
                                                            <span style={{
                                                                color: '#1B6B5A',
                                                                fontSize: '12px'
                                                            }}>
                                                                미제출
                                                            </span>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))}

                                    {data.budgetExecutions.length === 0 && (
                                        <div style={{ textAlign: 'center', color: '#9C9690', padding: '40px' }}>
                                            등록된 집행 내역이 없습니다.
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderContent = () => {
                if (loading) {
                    return (
                        <div className="loading">
                            <div className="loading-spinner"></div>
                            <div>데이터를 불러오고 있습니다...</div>
                        </div>
                    );
                }

                if (error) {
                    return (
                        <div>
                            <div className="error-message">
                                {error}
                            </div>
                            <button
                                className="btn btn-primary"
                                onClick={() => window.location.reload()}
                            >
                                다시 시도
                            </button>
                        </div>
                    );
                }

                switch(currentPage) {
                    case "dashboard": return renderDashboard();
                    case "budget": return renderBudget();
                    case "schedule": return renderSchedule();
                    case "gallery": return renderGallery();
                    case "board": return renderBoard();
                    default: return renderDashboard();
                }
            };

            return (
                <div>
                    {/* Header */}
                    <div className="header">
                        <div className="container">
                            <h1 style={{ margin: 0, fontSize: '24px', fontWeight: '700' }}>
                                아름다운재단 2026 공익단체 인큐베이팅 지원사업
                            </h1>
                            <p style={{ margin: '8px 0 0 0', fontSize: '15px', opacity: 0.9 }}>
                                청년노동자인권센터 • 총 예산 7천만원 • Supabase 연동
                            </p>
                        </div>
                    </div>

                    <div className="container">
                        {/* Navigation */}
                        <div className="navigation">
                            {[
                                { id: 'dashboard', label: '🏠 대시보드', description: '전체 현황 보기' },
                                {
                                    id: 'budget',
                                    label: '💰 예산관리',
                                    description: '고급 예산 집행 시스템'
                                },
                                { id: 'schedule', label: '📅 일정관리', description: '사업 일정 및 참여자 관리' },
                                { id: 'gallery', label: '📸 갤러리', description: '현장 사진 및 결과물' },
                                { id: 'board', label: '📋 게시판', description: '공지사항 및 자료실' }
                            ].map(nav => (
                                <button
                                    key={nav.id}
                                    className={`nav-btn ${currentPage === nav.id ? 'active' : ''}`}
                                    onClick={() => {
                                        setCurrentPage(nav.id);
                                    }}
                                    title={nav.description}
                                >
                                    {nav.label}
                                </button>
                            ))}
                        </div>

                        {/* Content */}
                        <div className="content-area">
                            {renderContent()}
                        </div>
                    </div>
                </div>
            );
        }

        // 앱 렌더링
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProjectManagementSystem />);
    </script>
</body>
</html>
