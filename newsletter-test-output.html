            <div key={s} className="flex items-center gap-2">
              <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-semibold transition-colors ${step >= s ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-400"}`}>
                {step > s ? <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg> : s}
              </div>
              {s < 3 && <div className={`flex-1 h-0.5 w-8 rounded ${step > s ? "bg-blue-600" : "bg-slate-100"}`}/>}
            </div>
          ))}
          <span className="ml-1 text-xs text-slate-400">{["정보 입력","관심사 선택","완료"][step-1]}</span>
        </div>
      </Card>

      {step === 1 && (
        <Card className="p-6">
          <h3 className="text-sm font-semibold text-slate-800 mb-4">기본 정보</h3>
          <div className="space-y-3">
            <div><label className="block text-xs font-medium text-slate-600 mb-1.5">이름 (선택)</label>
              <input type="text" placeholder="홍길동" value={name} onChange={e => setName(e.target.value)} className="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500" /></div>
            <div><label className="block text-xs font-medium text-slate-600 mb-1.5">이메일 <span className="text-red-500">*</span></label>
              <input type="email" placeholder="hello@example.com" value={email} onChange={e => setEmail(e.target.value)} className="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500" /></div>
          </div>
          <button onClick={() => email && setStep(2)} className={`w-full mt-5 py-2.5 text-sm font-semibold rounded-lg transition-colors ${email ? "bg-blue-600 text-white hover:bg-blue-700" : "bg-slate-100 text-slate-400 cursor-not-allowed"}`}>다음 단계</button>
        </Card>
      )}

      {step === 2 && (
        <Card className="p-6">
          <h3 className="text-sm font-semibold text-slate-800 mb-1">관심 주제 선택</h3>
          <p className="text-xs text-slate-500 mb-4">선택한 주제의 콘텐츠를 더 자세히 받아볼 수 있습니다.</p>
          <div className="flex flex-wrap gap-2 mb-6">
            {topics.map(t => (
              <button key={t} onClick={() => togglePref(t)} className={`px-3 py-1.5 rounded-lg text-xs font-medium border transition-all ${prefs.includes(t) ? "bg-blue-600 text-white border-blue-600" : "border-slate-200 text-slate-600 hover:bg-slate-50"}`}>{t}</button>
            ))}
          </div>
          <div className="flex gap-2">
            <button onClick={() => setStep(1)} className="px-4 py-2.5 text-sm font-medium border border-slate-200 rounded-lg text-slate-500 hover:bg-slate-50">이전</button>
            <button onClick={() => setStep(3)} className="flex-1 py-2.5 text-sm font-semibold bg-blue-600 text-white rounded-lg hover:bg-blue-700">구독 완료</button>
          </div>
        </Card>
      )}

      {step === 3 && (
        <Card className="p-8 text-center">
          <div className="w-14 h-14 rounded-full bg-emerald-50 flex items-center justify-center mx-auto mb-4">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <h3 className="text-base font-bold text-slate-900 mb-1">구독 완료!</h3>
          <p className="text-sm text-slate-500 mb-1">{name || "독자님"}, 환영합니다.</p>
          <p className="text-xs text-slate-400 mb-6">{email} 로 다음 호부터 발송됩니다.</p>
          {prefs.length > 0 && (
            <div className="flex flex-wrap justify-center gap-1.5 mb-6">
              {prefs.map(t => <Badge key={t} variant="accent">{t}</Badge>)}
            </div>
          )}
          <div className="rounded-lg bg-slate-50 border border-slate-100 p-4 text-left">
            <p className="text-xs font-semibold text-slate-700 mb-1">다음 호 예정 · Vol.3 No.4</p>
            <p className="text-xs text-slate-500">2026년 4월 4일 (금) 오전 9시</p>
          </div>
        </Card>
      )}
    </div>
  );
};

// ─────────────────────────────────────────────
// PAGE: GALLERY
// ─────────────────────────────────────────────
const GalleryPage = () => {
  const [selected, setSelected] = useState(null);
  return (
    <div className="space-y-4">
      <Card className="p-5">
        <h2 className="text-base font-bold text-slate-900 mb-0.5">📸 현장 기록</h2>
        <p className="text-xs text-slate-500">캠페인 현장과 센터 결과물 사진</p>
      </Card>
      {GALLERIES.map(g => (
        <Card key={g.id} className="overflow-hidden" onClick={() => setSelected(selected === g.id ? null : g.id)}>
          <img src={g.image} alt={g.title} className="w-full h-52 object-cover" />
          <div className="p-4">
            <div className="flex items-center gap-2 mb-2">
              <Badge variant={g.category === "캠페인" ? "pink" : "green"}>{g.category}</Badge>
              <span className="text-[11px] text-slate-400">📷 {g.photographer}</span>
            </div>
            <h3 className="text-sm font-semibold text-slate-800">{g.title}</h3>
            <p className="text-xs text-slate-500 mt-1.5 leading-relaxed">{g.caption}</p>
            {selected === g.id && (
              <div className="mt-3 pt-3 border-t border-slate-100">
                <div className="text-[11px] text-slate-400">📍 {g.location}</div>
              </div>
            )}
          </div>
        </Card>
      ))}
    </div>
  );
};

// ─────────────────────────────────────────────
// ROOT APP
// ─────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("home");
  const [selectedArticle, setSelectedArticle] = useState(null);
  const backMap = { article: "home", "event-detail": "events", gallery: "home" };

  return (
    <div className="min-h-screen bg-slate-50 font-sans">
      <TopNav page={page} setPage={setPage} back={backMap[page]} />
      <div className="max-w-[640px] mx-auto px-4 py-5 page-enter" key={page}>
        {page === "home" && <HomePage setPage={setPage} setSelected={setSelectedArticle} />}
        {page === "article" && <ArticlePage article={selectedArticle || ARTICLES[0]} setPage={setPage} />}
        {page === "archive" && <ArchivePage setPage={setPage} setSelected={setSelectedArticle} />}
        {page === "events" && <EventsPage setPage={setPage} />}
        {page === "subscribe" && <SubscribePage />}
        {page === "gallery" && <GalleryPage />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
